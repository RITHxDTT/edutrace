name: github_bot_telegram.yml

on:
  push:
    branches:
      - "**"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_BRANCH: ${{ github.ref_name }}
          GH_COMMIT: ${{ github.event.head_commit.message }}
        run: |
          escape_html() {
            echo "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
          }

          AUTHOR=$(escape_html "$GH_ACTOR")
          BRANCH=$(escape_html "$GH_BRANCH")
          COMMIT_MSG=$(escape_html "$GH_COMMIT")

          TIME_STR=$(TZ="Asia/Phnom_Penh" date +"%l:%M %p" | sed 's/^ //')

          read -r -d '' TEXT << EOM || true
          Hello team, the branch <code>$BRANCH</code> has been updated.
          
          <b>Repository:</b> $GITHUB_REPOSITORY
          <b>Author:</b> <i>$AUTHOR</i>
          <b>Time:</b> $TIME_STR (Phnom Penh)
          
          <b>Commit Message:</b>
          <code>$COMMIT_MSG</code>
        
          <i>Note: Don't forget to pull your <code>$BRANCH</code> branch. Thank you!</i>
          EOM

          curl -sS -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=-1003832791054" \
            -d "message_thread_id=2456" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=$TEXT"